name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            cd /var/www/ttcart

            echo ">>> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Backend: install & restart..."
            cd /var/www/ttcart/backend
            npm install --omit=dev
            pm2 restart ttcart-backend || pm2 start src/server.js --name ttcart-backend
            pm2 save

            echo ">>> Frontend: install & build..."
            cd /var/www/ttcart/frontend
            npm install
            npm run build

            echo ">>> Reloading nginx..."
            systemctl reload nginx

            echo ">>> Deploy done."
