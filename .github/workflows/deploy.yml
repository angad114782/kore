name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Show secret lengths
        run: |
          echo "HOST length: ${#HOST}"
          echo "PORT length: ${#PORT}"
          echo "USERNAME length: ${#USERNAME}"
        env:
          HOST: ${{ secrets.HOST }}
          PORT: ${{ secrets.PORT }}
          USERNAME: ${{ secrets.USERNAME }}